# =========================================
# CLOUDAURA CI/CD PIPELINE - YallaTN
# =========================================
name: CloudAura CI/CD

on:
  push:
    branches: [ main, master, develop ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy Backend'
        required: false
        default: 'true'
        type: boolean

      deploy_frontend:
        description: 'Deploy Frontend'
        required: false
        default: 'true'
        type: boolean

      deploy_ai:
        description: 'Deploy AI Service'
        required: false
        default: 'false'
        type: boolean

env:
  BACKEND_IMAGE: foufa68/cloudaura-backend
  FRONTEND_IMAGE: foufa68/cloudaura-frontend
  AI_IMAGE: foufa68/cloudaura-aiii
  K8S_NAMESPACE: cloudaura1

jobs:

  # =========================================
  # JOB 1: DETECT CHANGES
  # =========================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      ai: ${{ steps.changes.outputs.ai }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'

            frontend:
              - 'frontend/**'

            ai:
              - 'aiii/**'

  # =========================================
  # JOB 2: BUILD & PUSH BACKEND
  # =========================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    needs: detect-changes

    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.event.inputs.deploy_backend == 'true' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -DskipTests -B -q

      - name: Run Tests
        working-directory: ./backend
        run: mvn test -B -q
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # JOB 3: BUILD & PUSH FRONTEND
  # =========================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    needs: detect-changes

    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.event.inputs.deploy_frontend == 'true' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build Angular (production)
        working-directory: ./frontend
        run: npm run build -- --configuration production
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # JOB 4: BUILD AI SERVICE
  # =========================================
  build-ai:
    name: Build AI Service
    runs-on: ubuntu-latest

    needs: detect-changes

    if: |
      needs.detect-changes.outputs.ai == 'true' ||
      github.event.inputs.deploy_ai == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AI_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push AI
        uses: docker/build-push-action@v5
        with:
          context: ./aiii
          dockerfile: ./aiii/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ${{ env.AI_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # JOB 5: DEPLOY TO KUBERNETES
  # =========================================
  deploy:
    name: Deploy to Kubernetes

    runs-on: self-hosted

    needs:
      - build-backend
      - build-frontend
      - build-ai

    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-ai.result == 'success' || needs.build-ai.result == 'skipped') &&
      (needs.build-backend.result != 'failure') &&
      (needs.build-frontend.result != 'failure') &&
      (needs.build-ai.result != 'failure')

    environment:
      name: production
      url: https://unpillowed-redolently-tanja.ngrok-free.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes

      # =========================================
      # DEPLOY BACKEND
      # =========================================
      - name: Deploy Backend to k8s
        if: needs.build-backend.result == 'success'
        run: |
          echo "Rolling out new backend image..."

          kubectl set image deployment/cloudaura-backend \
            backend=${{ env.BACKEND_IMAGE }}:latest \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/cloudaura-backend \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      # =========================================
      # DEPLOY FRONTEND
      # =========================================
      - name: Deploy Frontend to k8s
        if: needs.build-frontend.result == 'success'
        run: |
          echo "Rolling out new frontend image..."

          kubectl set image deployment/cloudaura-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:latest \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/cloudaura-frontend \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      # =========================================
      # DEPLOY AI SERVICE
      # =========================================
      - name: Deploy AI Service to k8s
        if: needs.build-ai.result == 'success'
        run: |
          echo "Rolling out new AI image..."

          kubectl set image deployment/cloudaura-aiii \
            aiii=${{ env.AI_IMAGE }}:latest \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/cloudaura-aiii \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      # =========================================
      # HEALTH CHECK
      # =========================================
      - name: Health check
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}

          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}

      # =========================================
      # ROLLBACK ON FAILURE
      # =========================================
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."

          kubectl rollout undo deployment/cloudaura-backend \
            -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || true

          kubectl rollout undo deployment/cloudaura-frontend \
            -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || true

          kubectl rollout undo deployment/cloudaura-aiii \
            -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || true

          echo "=== Pods after rollback ==="

          kubectl get pods -n ${{ env.K8S_NAMESPACE }}

      # =========================================
      # DEPLOYMENT SUMMARY
      # =========================================
      - name: Summary
        if: success()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ✅ Deployed | \`${{ env.BACKEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ✅ Deployed | \`${{ env.FRONTEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AI | ✅ Deployed | \`${{ env.AI_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | 🌐 Live | https://unpillowed-redolently-tanja.ngrok-free.dev |" >> $GITHUB_STEP_SUMMARY