server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Max upload size (must be inside server block)
    client_max_body_size 20M;

    # ── Angular SPA routing ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:9091/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
    }

    # ── Backend file uploads (product images, avatars…) ──────────────
    location /uploads/ {
        proxy_pass         http://backend:9091/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }

    # ── Static Media Assets (Fonts, images, etc.) ───────────────────
    location ~* ^/media/.*\.(?:woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Media API ────────────────────────────────────────────────────
    location /media/ {
        proxy_pass         http://backend:9091;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Social-feed endpoints ─────────────────────────────────────────
    location ~ ^/(post|comment|like|follow|saved-post|chatroom|story)/ {
        proxy_pass         http://backend:9091;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── WebSocket (chat / real-time notifications) ────────────────────
    location /ws {
        proxy_pass         http://backend:9091/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;
    }

    location /ws-native {
        proxy_pass         http://backend:9091/ws-native;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;
    }

}
