swift.auth-url=${SWIFT_AUTH_URL:http://controller:5000/v3}
swift.username=${SWIFT_USERNAME:myuser}
swift.password=${SWIFT_PASSWORD:controller}
swift.project-name=${SWIFT_PROJECT_NAME:cloudaura}
swift.container=${SWIFT_CONTAINER:cloudaura-uploads}

swift.public-url=http://controller:8080/v1/a131d52ca82444039f2a42202440851c/cloudaura-uploads