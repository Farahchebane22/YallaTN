# ==============================================================================
# CLOUDAURA BACKEND - KUBERNETES PRODUCTION CONFIGURATION
# ==============================================================================
# All sensitive values must be injected via Environment Variables / Secrets.
# Pattern: property.name=${ENV_VAR_NAME:fallback_value}
# ==============================================================================

spring.application.name=backend
server.port=${SERVER_PORT:9091}
server.address=0.0.0.0
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# рЯУ¶ MULTIPART
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:15MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

# рЯЧДпЄП DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/Yallatn?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.pool-name=CloudauraHikariPool

# рЯПЧпЄП JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# рЯФР SECURITY / JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# рЯМР CORS / URLs
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://ragweed-catfish-judicial.ngrok-free.dev}
app.backend.base-url=${APP_BACKEND_BASE_URL:http://localhost:9091}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200,https://ragweed-catfish-judicial.ngrok-free.dev}
app.public.base-url=${APP_PUBLIC_BASE_URL:${app.backend.base-url}}
app.public.url=${APP_PUBLIC_URL:${app.frontend.base-url}}

# рЯУІ MAIL CONFIG
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}

# рЯЫНпЄП SHOP MAIL
app.shop.mail.host=${SHOP_MAIL_HOST:${spring.mail.host}}
app.shop.mail.port=${SHOP_MAIL_PORT:${spring.mail.port}}
app.shop.mail.username=${SHOP_MAIL_USERNAME:${spring.mail.username}}
app.shop.mail.password=${SHOP_MAIL_APP_PASSWORD:${spring.mail.password}}

# рЯФС EXTERNAL API KEYS (Secrets)
app.currency.exchange-api-key=${EXCHANGERATE_API_KEY:}
aviationstack.access-key=${AVIATIONSTACK_KEY:}
opensky.bearer-token=${OPENSKY_TOKEN:}
app.gemini.api-key=${GEMINI_API_KEY}
app.imgbb.api-key=${IMGBB_API_KEY}
app.ai.huggingface.api-key=${HUGGINGFACE_API_KEY}
stripe.api.key=${STRIPE_API_KEY}
app.moderation.sightengine.api-user=${SIGHTENGINE_USER}
app.moderation.sightengine.api-secret=${SIGHTENGINE_SECRET}
app.giphy.api-key=${GIPHY_API_KEY}
app.stream.chat.api-key=${STREAM_CHAT_KEY}
app.stream.chat.secret=${STREAM_CHAT_SECRET}
app.voice.elevenlabs.api-key=${ELEVENLABS_KEY}
paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET}
twilio.account-sid=${TWILIO_SID}
twilio.auth-token=${TWILIO_TOKEN}
duffel.api-key=${DUFFEL_KEY}
gemini.api.key.community=${GEMINI_COMMUNITY_KEY}
app.groq.api-key=${GROQ_KEY}

# рЯ§Ц AI MODELS
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.huggingface.model=${HUGGINGFACE_MODEL:black-forest-labs/FLUX.1-schnell}

# рЯМР OAUTH2
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:${app.frontend.base-url}/signin}
app.oauth2.google-client-id=${GOOGLE_CLIENT_ID}
app.oauth2.google-client-secret=${GOOGLE_CLIENT_SECRET}
app.oauth2.facebook-client-id=${FACEBOOK_CLIENT_ID}
app.oauth2.facebook-client-secret=${FACEBOOK_CLIENT_SECRET}
app.oauth2.github-client-id=${GITHUB_CLIENT_ID}
app.oauth2.github-client-secret=${GITHUB_CLIENT_SECRET}

# Spring Security OAuth2 Wiring
spring.security.oauth2.client.registration.google.client-id=${app.oauth2.google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${app.oauth2.google-client-secret}
spring.security.oauth2.client.registration.github.client-id=${app.oauth2.github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${app.oauth2.github-client-secret}
spring.security.oauth2.client.registration.facebook.client-id=${app.oauth2.facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${app.oauth2.facebook-client-secret}

#рЯ©Ї ACTUATOR / K8S PROBES
management.endpoints.web.base-path=/api/actuator
management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always

management.endpoint.prometheus.access=unrestricted

management.prometheus.metrics.export.enabled=true

management.health.probes.enabled=true

# рЯІ™ OTHERS
app.translation.enabled=${TRANSLATION_ENABLED:false}
reservation.cleanup.enabled=${CLEANUP_ENABLED:true}
twilio.enabled=${TWILIO_ENABLED:false}
amadeus.enabled=${AMADEUS_ENABLED:false}

